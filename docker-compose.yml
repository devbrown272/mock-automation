version: "3.9"

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqlconnector://pipeline_user:pipeline_pass@mysql:3306/refresh_jobs
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  REPORT_URL:  http://mock_portal:5001
  REPORT_USER: admin
  REPORT_PASS: password
  DB_HOST:     mysql
  DB_PORT:     "3306"
  DB_USER:     pipeline_user
  DB_PASS:     pipeline_pass
  DB_NAME:     refresh_jobs

services:

  mysql:
    image: mysql:8.0
    container_name: refresh_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE:      refresh_jobs
      MYSQL_USER:          pipeline_user
      MYSQL_PASSWORD:      pipeline_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pipeline_user", "-ppipeline_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  mock_portal:
    build:
      context: ./mock_app
      dockerfile: Dockerfile
    container_name: refresh_mock_portal
    restart: unless-stopped
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy

  automation:
    build:
      context: ./automation
      dockerfile: Dockerfile
    container_name: refresh_automation
    restart: "no"
    environment:
      REPORT_URL:  http://mock_portal:5001
      REPORT_USER: admin
      REPORT_PASS: password
      DB_HOST:     mysql
      DB_PORT:     "3306"
      DB_USER:     pipeline_user
      DB_PASS:     pipeline_pass
      DB_NAME:     refresh_jobs
    depends_on:
      mysql:
        condition: service_healthy
      mock_portal:
        condition: service_started
    volumes:
      - ./automation:/opt/automation:ro

  airflow-init:
    image: apache/airflow:2.9.0
    container_name: refresh_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Finance --lastname Ops \
          --role Admin --email ops@company.com
        airflow pools set refresh_browser_pool 20 "Max concurrent browser sessions"
    environment:
      <<: *airflow-env
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  airflow-web:
    image: apache/airflow:2.9.0
    container_name: refresh_airflow_web
    command: webserver
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: refresh_airflow_scheduler
    command: scheduler
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins:ro
      - ./automation:/opt/automation:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  mysql_data: